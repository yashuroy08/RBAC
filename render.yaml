services:
  - type: web
    name: rbac-backend
    runtime: docker
    envVars:
      - key: PORT
        value: 8081
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${RBAC_DB_HOST}:${RBAC_DB_PORT}/${RBAC_DB_NAME}
      - key: RBAC_DB_HOST
        fromDatabase:
          name: rbac-db
          property: host
      - key: RBAC_DB_PORT
        fromDatabase:
          name: rbac-db
          property: port
      - key: RBAC_DB_NAME
        fromDatabase:
          name: rbac-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: rbac-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: rbac-db
          property: password
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_JPA_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://threads-fashion.vercel.app,https://threads-fashion-backend.onrender.com,http://localhost:5173

databases:
  - name: rbac-db
    databaseName: rbac_db
    user: rbac_user
    plan: free
