services:
  - type: web
    name: rbac-backend
    runtime: docker
    plan: free
    healthCheckPath: /api/auth/health
    envVars:
      - key: PORT
        value: 8081
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: rbac-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: rbac-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: rbac-db
          property: password
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_JPA_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://rbac-guard.vercel.app,https://threads-fashion.vercel.app,http://localhost:5173,http://localhost:3000
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: none
      - key: SHOW_SQL
        value: "false"

databases:
  - name: rbac-db
    databaseName: rbac_db
    user: rbac_user
    plan: free
