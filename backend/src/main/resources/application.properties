# Application Configuration
spring.application.name=RBAC Risk Evaluator System
server.port=${PORT:8081}

# Database Configuration (defaults to MS SQL for local dev, PostgreSQL in production via env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=rbac_db;encrypt=true;trustServerCertificate=true;}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:springuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Spring@123}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}

# Connection Pool Configuration (critical for free-tier databases)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.SQLServer2012Dialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Spring Session JDBC Configuration
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.sql.init.mode=always
spring.session.timeout=1800

# Session Configuration (30 minutes)
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.name=RBAC_SESSION
# SameSite cookie policy — 'none' for cross-origin deployment (Vercel → Render)
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAMESITE:lax}

# Risk Evaluator Configuration
risk.evaluator.max-sessions=2
risk.evaluator.risk-threshold=70.0

# Logging Configuration
logging.level.root=INFO
logging.level.com.project.rbac=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# Swagger Configuration
spring.mvc.pathmatch.matching-strategy=ant-path-matcher
