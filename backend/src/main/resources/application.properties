# Application Configuration
spring.application.name=RBAC Risk Evaluator System
server.port=${PORT:8081}

# Database Configuration (defaults to MS SQL for local dev, PostgreSQL in production via env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=rbac_db;encrypt=true;trustServerCertificate=true;}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:springuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Spring@123}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}

# Connection Pool Configuration (critical for free-tier databases)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.SQLServer2012Dialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Spring Session Redis Configuration
spring.session.store-type=redis
spring.session.timeout=1800
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=${REDIS_TIMEOUT:2000}
spring.redis.ssl=${REDIS_SSL:false}
# Session Configuration (30 minutes)
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.name=RBAC_SESSION
# SameSite cookie policy — 'None' REQUIRED for cross-origin deployment (Vercel → Render)
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAMESITE:None}

# Risk Evaluator Configuration
risk.evaluator.max-sessions=2
risk.evaluator.risk-threshold=70.0

# Logging Configuration
logging.level.root=INFO
logging.level.com.project.rbac=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# Swagger Configuration
spring.mvc.pathmatch.matching-strategy=ant-path-matcher

# Proxy Configuration
server.forward-headers-strategy=framework

# Spring Mail (Gmail SMTP) Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:mock}
spring.mail.password=${MAIL_PASSWORD:mock}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
