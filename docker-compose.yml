services:
  db:
    image: postgres:15-alpine
    container_name: rbac-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-springuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Spring@123}
      POSTGRES_DB: ${POSTGRES_DB:-rbac_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-springuser} -d ${POSTGRES_DB:-rbac_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rbac-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rbac-backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-rbac_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-springuser}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-Spring@123}
      - SPRING_DATASOURCE_DRIVER=org.postgresql.Driver
      - SPRING_JPA_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PLATFORM=postgresql
      - PORT=8081
      # Local Dev CORS: allow localhost over HTTP
      - ALLOWED_ORIGINS=http://localhost,http://localhost:3000,http://localhost:5173
      - SESSION_COOKIE_SECURE=false
      - SESSION_COOKIE_SAMESITE=Lax
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/auth/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: rbac-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
      - goaccess_data:/var/www/dashboard:ro
    depends_on:
      rbac-backend:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    container_name: rbac-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis

  goaccess:
    image: allinurl/goaccess:latest
    container_name: rbac-nginx-dashboard
    ports:
      - "7890:7890"
    volumes:
      - nginx_logs:/opt/log
      - goaccess_data:/var/www/html
    environment:
      - LANG=en_US.UTF-8
    command: /opt/log/access_file.log --log-format=COMBINED --real-time-html --output=/var/www/html/index.html --ws-url=ws://localhost:7890
    depends_on:
      - nginx

volumes:
  postgres_data:
  nginx_logs:
  goaccess_data:

